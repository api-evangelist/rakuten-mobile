apis:
  - aid: rakuten-mobile:rakuten-cpaas-sms-api
    name: Rakuten CPaaS SMS / Messaging API
    tags:
      - SMS
      - Messaging
      - CPaaS
      - A2P
      - P2A
      - Delivery Receipts
    humanURL: https://docs.cpaas.symphony.rakuten.net/getting-started/sms-api/
    baseURL: https://api.cpaas.symphony.rakuten.net/sms/v1
    description: >-
      Carrier-grade SMS API for sending and receiving A2P and P2A SMS at
      scale on the Rakuten Mobile network, with delivery receipts pushed
      to caller-configured webhooks. UTF-8 encoded, JWT-authenticated
      REST endpoints (HTTP variant) alongside an SMPP variant for bulk
      MNO interconnect. Sender addresses must be pre-registered with
      operators. Used by enterprises for OTP delivery, transactional
      alerts, and marketing campaigns through the Rakuten CPaaS
      dashboard.
    properties:
      - url: https://docs.cpaas.symphony.rakuten.net/getting-started/sms-api/
        type: Documentation
      - url: https://docs.cpaas.symphony.rakuten.net/getting-started/sms-api/http-api/sending_sms
        type: Documentation
      - url: https://symphony.rakuten.com/cpaas/en/sms
        type: ProductPage
      - url: https://symphony.rakuten.com/cpaas/en/sms/feature
        type: Features
      - url: https://symphony.rakuten.com/cpaas/en/sms/faq-en/what-is-the-connection-method-to-the-api
        type: FAQ
  - aid: rakuten-mobile:rakuten-cpaas-confirm-api
    name: Rakuten CPaaS Confirm (OTP) API
    tags:
      - OTP
      - 2FA
      - Authentication
      - Confirm
      - CPaaS
      - Voice
    humanURL: https://docs.cpaas.symphony.rakuten.net/getting-started/confirm-api/
    baseURL: https://api.cpaas.symphony.rakuten.net
    description: >-
      One-time PIN delivery and verification API for two-factor
      authentication and transaction confirmation, with SMS and Voice
      channel support, lifecycle operations for request / validate /
      resend / cancel, JWT bearer authentication, and standard JSON
      payloads over HTTPS. Built for fraud-sensitive enterprise flows
      requiring carrier-grade reach and audit trails.
    properties:
      - url: https://docs.cpaas.symphony.rakuten.net/getting-started/confirm-api/
        type: Documentation
      - url: https://symphony.rakuten.com/cpaas/en
        type: ProductPage
  - aid: rakuten-mobile:rakuten-cpaas-shorturl-api
    name: Rakuten CPaaS Short URL API
    tags:
      - Short URL
      - Tracking
      - Campaigns
      - CPaaS
    humanURL: https://docs.cpaas.symphony.rakuten.net/getting-started/shorturl-api/
    baseURL: https://api.cpaas.symphony.rakuten.net
    description: >-
      Link shortening and analytics API for CPaaS campaigns. Supports
      create / retrieve / update / list / delete operations on short
      URLs, with JWT bearer authentication, UTC timestamps, JSON over
      HTTPS, and click-tracking telemetry that feeds the CPaaS
      dashboard's campaign analytics views.
    properties:
      - url: https://docs.cpaas.symphony.rakuten.net/getting-started/shorturl-api/
        type: Documentation
      - url: https://symphony.rakuten.com/cpaas/en
        type: ProductPage
