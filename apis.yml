aid: rakuten-mobile
name: Rakuten Mobile
description: >-
  Rakuten Mobile is the Japanese mobile network operator (MNO) of Rakuten
  Group, headquartered in Setagaya, Tokyo, and Japan's fourth nationwide
  carrier alongside NTT Docomo, KDDI, and SoftBank. Commercially launched
  in April 2020 and surpassing 10 million subscribers in December 2025,
  Rakuten Mobile built and operates the world's first fully cloud-native,
  end-to-end virtualized mobile network on Open RAN, with 4G population
  coverage of 99.9% and expanding 5G plus 700 MHz Platinum Band rollout.
  The same engineering effort spun out into Rakuten Symphony, a B2B
  business that productizes the Rakuten Mobile playbook as the Symworld
  platform — a cloud-native operating platform for telcos covering Open
  RAN (CU/DU/RIC, Symware distributed unit appliance), Symworld Cloud
  (Kubernetes-based hyperconverged telco cloud / CNP), OSS/BSS, site
  management, and a marketplace of pre-integrated cloud-native network
  functions from 50+ vendor partners. Symphony also offers Rakuten CPaaS
  (carrier-grade SMS, Confirm/OTP, and Short URL APIs running on the
  Rakuten Mobile network with JWT-authenticated REST endpoints at
  api.cpaas.symphony.rakuten.net) and Rakuten Communications Platform
  (RCP) for enterprise private 5G. Public, developer-accessible APIs are
  concentrated in the CPaaS suite; the Symworld platform APIs themselves
  are TM Forum-aligned but exposed under commercial engagement rather
  than a public developer signup.
